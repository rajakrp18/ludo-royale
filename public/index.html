<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ludo Royale — Play Online with Friends</title>
  <meta name="description" content="Play Ludo online with friends! Create a room, share the code, and enjoy real-time multiplayer Ludo.">
  <meta name="theme-color" content="#0f172a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══ SCREEN 1: WELCOME ═══ -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-container">
      <div class="particles" id="particles"></div>
      <div class="welcome-card">
        <div class="logo">
          <div class="logo-dice">🎲</div>
          <h1 class="logo-title">LUDO<span class="logo-accent">ROYALE</span></h1>
          <p class="logo-subtitle">Play with friends anywhere in the world</p>
        </div>
        <div class="form-group">
          <label for="playerName">Your Name</label>
          <input type="text" id="playerName" placeholder="Enter your name..." maxlength="15" autocomplete="off">
        </div>
        <div class="welcome-buttons">
          <button class="btn btn-primary" id="btnCreateRoom"><span class="btn-icon">✦</span> Create Room</button>
          <button class="btn btn-secondary" id="btnShowJoin"><span class="btn-icon">→</span> Join Room</button>
        </div>

        <!-- Play vs Computer -->
        <button class="btn btn-bot" id="btnShowBot" style="width:100%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;box-shadow:0 4px 20px rgba(139,92,246,0.3);">
          <span class="btn-icon">🤖</span> Play vs Computer
        </button>
        <div id="botSection" class="join-section hidden">
          <div style="display:flex;gap:8px;width:100%;">
            <button class="btn btn-bot-diff active" data-diff="easy" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#94a3b8;font-size:0.85rem;cursor:pointer;">😊 Easy</button>
            <button class="btn btn-bot-diff" data-diff="medium" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.1);color:#fbbf24;font-size:0.85rem;cursor:pointer;font-weight:600;">🧠 Medium</button>
            <button class="btn btn-bot-diff" data-diff="hard" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#94a3b8;font-size:0.85rem;cursor:pointer;">🔥 Hard</button>
          </div>
          <button class="btn btn-accent" id="btnStartBot" style="width:100%;"><span class="btn-icon">▶</span> Start Game vs Bot</button>
        </div>
        <div id="joinSection" class="join-section hidden">
          <div class="form-group">
            <label for="roomCodeInput">Room Code</label>
            <input type="text" id="roomCodeInput" placeholder="e.g. ABC123" maxlength="6" autocomplete="off"
                   style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:1.2rem;">
          </div>
          <button class="btn btn-accent" id="btnJoinRoom"><span class="btn-icon">🎮</span> Join Game</button>
        </div>
        <p class="error-msg hidden" id="welcomeError"></p>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 2: LOBBY ═══ -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-container">
      <div class="lobby-card">
        <h2 class="lobby-title">Game Lobby</h2>
        <div class="room-code-box">
          <span class="room-code-label">Room Code</span>
          <div class="room-code-value" id="lobbyRoomCode">------</div>
          <button class="btn-copy" id="btnCopyCode" title="Copy link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
        <button class="btn btn-accent" id="btnShareLink" style="width:100%;">
          <span class="btn-icon">📤</span> Share Invite Link
        </button>
        <p class="lobby-info">Friends tap the link → enter name → they're in!</p>
        <div class="player-slots" id="playerSlots">
          <div class="player-slot" data-color="red"><div class="slot-avatar red"></div><span class="slot-name">Waiting...</span></div>
          <div class="player-slot" data-color="green"><div class="slot-avatar green"></div><span class="slot-name">Waiting...</span></div>
          <div class="player-slot" data-color="yellow"><div class="slot-avatar yellow"></div><span class="slot-name">Waiting...</span></div>
          <div class="player-slot" data-color="blue"><div class="slot-avatar blue"></div><span class="slot-name">Waiting...</span></div>
        </div>
        <button class="btn btn-primary btn-start hidden" id="btnStartGame"><span class="btn-icon">▶</span> Start Game</button>
        <p class="lobby-status" id="lobbyStatus">Waiting for players to join...</p>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 3: GAME ═══ -->
  <div id="screen-game" class="screen">
    <div class="game-layout">
      <div class="game-topbar">
        <div class="game-players" id="gamePlayers"></div>
      </div>
      <div class="board-wrapper">
        <div class="board-frame">
          <svg id="ludoBoard" viewBox="0 0 615 615" class="ludo-board"></svg>
        </div>
      </div>
      <div class="game-controls">
        <div class="dice-area">
          <div class="dice-box" id="diceBox">
            <svg id="diceSvg" width="52" height="52" viewBox="0 0 60 60">
              <rect x="1" y="1" width="58" height="58" rx="10" fill="#FFFDF5" stroke="#8B7355" stroke-width="2"/>
              <text x="30" y="35" text-anchor="middle" font-size="26" fill="#8B7355">?</text>
            </svg>
          </div>
          <button class="btn-roll" id="btnRollDice">ROLL DICE</button>
        </div>
        <div class="game-message" id="gameMessage">Your turn! Roll the dice.</div>
        <button class="btn-chat-toggle" id="btnChatToggle">💬</button>
        <button class="btn-voice-toggle" id="btnVoiceToggle" title="Join Voice Chat">🎤</button>
      </div>
      <div class="chat-panel hidden" id="chatPanel">
        <div class="chat-header"><span>Chat</span><button class="btn-close-chat" id="btnCloseChat">×</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Type..." maxlength="200">
          <button class="btn-send" id="btnSendChat">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 4: WINNER ═══ -->
  <div id="screen-winner" class="screen">
    <div class="winner-container">
      <canvas id="confettiCanvas"></canvas>
      <div class="winner-card">
        <div class="winner-crown">👑</div>
        <h2 class="winner-title" id="winnerTitle">Player Wins!</h2>
        <p class="winner-subtitle">All 4 tokens reached home!</p>
        <div class="winner-actions">
          <button class="btn btn-primary" id="btnRematch"><span class="btn-icon">🔄</span> Play Again</button>
          <button class="btn btn-secondary" id="btnNewGame"><span class="btn-icon">🏠</span> New Game</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <!-- Hidden audio elements for voice chat remote streams -->
  <div id="remoteAudioContainer" style="display:none;"></div>
  <script src="game.js"></script>
</body>
</html>
